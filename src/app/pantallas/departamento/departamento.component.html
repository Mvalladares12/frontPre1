<!-- departamento.component.html -->
<div class="container">
  <h2>Lista de Departamentos</h2>

  <!-- Tabla responsive con scroll horizontal -->
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- Columna ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Columna Código -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Código </th>
        <td mat-cell *matCellDef="let element">
          <span class="codigo-badge">{{element.codigo}}</span>
        </td>
      </ng-container>

      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <!-- Columna Municipios -->
      <ng-container matColumnDef="municipios">
        <th mat-header-cell *matHeaderCellDef> Municipios </th>
        <td mat-cell *matCellDef="let element">
          <div *ngIf="element.municipios.length > 0; else sinMunicipios" class="municipios-container">
            <mat-chip-set>
              <mat-chip *ngFor="let municipio of element.municipios"
                        [matTooltip]="'Código: ' + municipio.codigo"
                        [matTooltipPosition]="'above'"
                        class="municipio-chip">
                {{municipio.nombre}}
              </mat-chip>
            </mat-chip-set>
            <span class="municipios-count">
              ({{getMunicipiosCount(element.municipios)}})
            </span>
          </div>
          <ng-template #sinMunicipios>
            <span class="no-municipios">Sin municipios</span>
          </ng-template>
        </td>
      </ng-container>

      <!-- Columna Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <div class="acciones-container">
            <button *kaHasRoles="['ver']" mat-icon-button color="primary"
                    (click)="verDetalles(element)"
                    matTooltip="Ver detalles"
                    matTooltipPosition="above"
                    aria-label="Ver detalles">
              <mat-icon>visibility</mat-icon>
            </button>
            <button *kaHasRoles="['editar_departamento']; resource: 'front-app'" mat-icon-button color="accent"
                    (click)="editarDepartamento(element)"
                    matTooltip="Editar"
                    matTooltipPosition="above"
                    aria-label="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button *kaHasRoles="['eliminar_departamento']; resource: 'front-app'" mat-icon-button color="warn"
                    (click)="eliminarDepartamento(element)"
                    matTooltip="Eliminar"
                    matTooltipPosition="above"
                    aria-label="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Fila cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">
          <div class="no-data-message">
            <mat-icon>info</mat-icon>
            <p>No se encontraron departamentos</p>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- Paginador responsive -->
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"
                 [pageSize]="5"
                 [showFirstLastButtons]="true"
                 aria-label="Paginador de departamentos">
  </mat-paginator>
</div>
