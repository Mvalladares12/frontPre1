<!-- tabla-municipios.component.html -->
<div class="container">
  <h2>Lista de Municipios</h2>

  <!-- Filtro de búsqueda -->
<!--  <mat-form-field appearance="outline" class="filter-field">-->
<!--    <mat-label>Buscar municipio</mat-label>-->
<!--    <input matInput (keyup)="applyFilter($event)" placeholder="Ej. San Salvador" #input>-->
<!--    <mat-icon matSuffix>search</mat-icon>-->
<!--    <mat-hint>Buscar por nombre, código o departamento</mat-hint>-->
<!--  </mat-form-field>-->

  <!-- Tabla responsive con scroll horizontal -->
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- Columna ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Columna Código -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Código </th>
        <td mat-cell *matCellDef="let element">
          <span class="codigo-badge">{{element.codigo}}</span>
        </td>
      </ng-container>

      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <!-- Columna ID Departamento -->
      <ng-container matColumnDef="idDepartamento">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID Depto </th>
        <td mat-cell *matCellDef="let element">
          <span class="depto-badge">Depto {{element.idDepartamento}}</span>
        </td>
      </ng-container>

      <!-- Columna Distritos -->
      <ng-container matColumnDef="distritos">
        <th mat-header-cell *matHeaderCellDef> Distritos </th>
        <td mat-cell *matCellDef="let element">
          <div *ngIf="element.distritos.length > 0; else sinDistritos" class="distritos-container">
            <mat-chip-set>
              <mat-chip *ngFor="let distrito of element.distritos"
                        [matTooltip]="'Código: ' + distrito.codigo"
                        [matTooltipPosition]="'above'"
                        class="distrito-chip">
                {{distrito.nombre}}
              </mat-chip>
            </mat-chip-set>
            <span class="distritos-count">
              ({{getDistritosCount(element.distritos)}})
            </span>
          </div>
          <ng-template #sinDistritos>
            <span class="no-distritos">Sin distritos</span>
          </ng-template>
        </td>
      </ng-container>

      <!-- Columna Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <div class="acciones-container">
            <button *kaHasRoles="['ver']" mat-icon-button color="primary"
                    (click)="verDetalles(element)"
                    matTooltip="Ver detalles"
                    matTooltipPosition="above"
                    aria-label="Ver detalles">
              <mat-icon>visibility</mat-icon>
            </button>
            <button *kaHasRoles="['editar_municipio']; resource: 'front-app'" mat-icon-button color="accent"
                    (click)="editarMunicipio(element)"
                    matTooltip="Editar"
                    matTooltipPosition="above"
                    aria-label="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button *kaHasRoles="['eliminar_municipio']; resource: 'front-app'" mat-icon-button color="warn"
                    (click)="eliminarMunicipio(element)"
                    matTooltip="Eliminar"
                    matTooltipPosition="above"
                    aria-label="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Fila cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6">
          <div class="no-data-message">
            <mat-icon>info</mat-icon>
<!--            <p>No se encontraron municipios con el filtro "{{input.value}}"</p>-->
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- Paginador responsive -->
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"
                 [pageSize]="5"
                 [showFirstLastButtons]="true"
                 aria-label="Paginador de municipios">
  </mat-paginator>
</div>
