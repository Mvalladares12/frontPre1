<!-- distrito.component.html -->
<div class="container">
  <div class="page-header">
    <h2>Lista de Distritos</h2>

    <button *appTieneRol="['crear_distrito', 'front-app2']"
            mat-flat-button
            color="primary"
            (click)="crearDistrito()">
      <mat-icon>add</mat-icon>
      Nuevo Distrito
    </button>
  </div>

  <!-- Tabla responsive con scroll horizontal -->
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- Columna ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Columna Código -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Código </th>
        <td mat-cell *matCellDef="let element">
          <span class="codigo-badge">{{element.codigo}}</span>
        </td>
      </ng-container>

      <!-- Columna Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>

      <!-- Columna ID Municipio -->
      <ng-container matColumnDef="idMunicipio">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID Municipio </th>
        <td mat-cell *matCellDef="let element">
          <span class="municipio-badge">Mun. {{element.idMunicipio}}</span>
        </td>
      </ng-container>

      <!-- Columna Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <div class="acciones-container">
            <button *kaHasRoles="['ver']" mat-icon-button color="primary"
                    (click)="verDetalles(element)"
                    matTooltip="Ver detalles"
                    matTooltipPosition="above"
                    aria-label="Ver detalles">
              <mat-icon>visibility</mat-icon>
            </button>
            <button *appTieneRol="['actualizar_distrito', 'front-app2']" mat-icon-button color="accent"
                    (click)="editarDistrito(element)"
                    matTooltip="Editar"
                    matTooltipPosition="above"
                    aria-label="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button *appTieneRol="['borrar_distrito', 'front-app2']" mat-icon-button color="warn"
                    (click)="eliminarDistrito(element)"
                    matTooltip="Eliminar"
                    matTooltipPosition="above"
                    aria-label="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Fila cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">
          <div class="no-data-message">
            <mat-icon>info</mat-icon>
            <p>No se encontraron distritos</p>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- Paginador responsive -->
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"
                 [pageSize]="5"
                 [showFirstLastButtons]="true"
                 aria-label="Paginador de distritos">
  </mat-paginator>
</div>
